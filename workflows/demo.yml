name: Events Demo 1
on:
  pull_request:
    types:
      - opened
  workflow_dispatch:
  push:
    branches: #A push made to only the given branches will trigger the workflow
      - main
      - "dev-*"
    paths-ignore: #Will not trigger workflow if changes are made to a particular file
      - ".github/workflows/*"
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: upload artifacts
        with:
          name: dist-files
          path: |
            dist
            package.json

      - name: Deploy project
        run: echo "Deploying..."
